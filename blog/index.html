---
layout: default
title: Blog
---

    <h2>Thoughts</h2>
<ul style="padding-left: 14px;">
  {% for post in site.posts %}
    <li style="margin: 12px 0; line-height: 1.55;">
      <a href="{{ post.url | relative_url }}" 
         class="thought-link"
         style="text-decoration:none; font-weight:normal; font-size:15px; color:#000;">
         {{ post.title }}
      </a>
      <small style="color:#888; font-size:13px; margin-left:6px;"> {{ post.date | date: "%b %d, %Y" }}</small>
    </li>
  {% endfor %}
</ul>
<div style="margin-top: 24px;">
  <a href="{{ '/' | relative_url }}"
     class="back-link"
     style="text-decoration:none; color:#666; border:none; padding:2px 4px; border-radius:0; font-size:18px; font-weight:700; line-height:1;"
     aria-label="Back to Home"
     title="Back to Home">
     &larr;
  </a>
</div>

<script>
  window.addEventListener("pageshow", function (event) {
    if (event.persisted) {
      window.location.reload();
    }
  });
</script>
