<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>COEX Starfield Restaurants</title>
  <link rel="stylesheet" href="fonts.css">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --font-serif: var(--font-main);
      --font-sans: var(--font-main);
      --ink: #1d1d1f; --ink-soft: #3a3a3c; --muted: #6e6e73;
      --line: #e5e5e7; --accent: #3a3a3c; --pad: clamp(20px, 5vw, 60px);
    }
    body {
      background: #fff;
      font-family: var(--font-serif);
      color: var(--ink);
      font-size: 15.5px;
      line-height: 1.5;
      -webkit-font-smoothing: auto;
    }
    .page { max-width: 1100px; margin: 0 auto; padding: 36px var(--pad) 80px; }

    .back { display: inline-flex; align-items: center; font-size: 16px; font-weight: 400; color: #1d1d1f; background: none; border: none; padding: 0; text-decoration: none; margin-top: 12px; margin-bottom: 28px; }
    .back:hover { color: #3273dc; background: none; opacity: 1; }

    h1 { font-size: clamp(20px, 3vw, 28px); font-weight: 400; margin-bottom: 6px; }
    .subtitle { color: var(--muted); font-size: 17px; margin-bottom: 28px; }

    /* Search */
    .search-box {
      width: 100%;
      padding: 10px 14px;
      font-family: var(--font-serif);
      font-size: 15.5px;
      border: 1.5px solid var(--line);
      border-radius: 10px;
      outline: none;
      margin-bottom: 20px;
      color: var(--ink);
    }
    .search-box:focus { border-color: #c9aee0; }

    /* Category tabs */
    .cats {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-bottom: 28px;
    }
    .cat-btn {
      font-family: var(--font-serif);
      font-size: 15.5px;
      padding: 5px 14px;
      border-radius: 8px;
      border: 1.5px solid var(--line);
      background: #fff;
      color: var(--ink-soft);
      cursor: pointer;
    }
    .cat-btn.active {
      background: var(--accent);
      border-color: var(--accent);
      color: #fff;
    }

    /* Cards */
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
      gap: 14px;
    }
    .card {
      border: 1px solid var(--line);
      border-radius: 12px;
      padding: 16px 18px;
      display: flex;
      flex-direction: column;
    }
    .card-name-en { font-weight: 700; font-size: 17px; color: var(--ink); margin-bottom: 2px; }
    .card-name-ko { font-family: var(--font-sans); font-size: 15.5px; color: var(--muted); margin-bottom: 8px; }
    .card-floor {
      display: inline-block;
      font-size: 13px;
      font-weight: 700;
      background: #f2f2f2;
      color: var(--accent);
      padding: 2px 8px;
      border-radius: 99px;
      margin-bottom: 10px;
    }
    .card-floor-row { display: flex; justify-content: space-between; align-items: center; margin-top: auto; padding-top: 10px; }
    .card-link {
      font-size: 14px;
      color: #3273dc;
      text-decoration: underline;
    }
    .card-link:hover { opacity: 0.7; }

    .empty { color: var(--muted); padding: 40px 0; text-align: center; font-size: 15.5px; }

    .quick-tiles { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin: 20px 0 28px; }
    .quick-tile {
      display: flex; align-items: center; justify-content: center;
      background: #3a3a3c; border: 1.5px solid #3a3a3c; border-radius: 12px;
      padding: 14px 18px; text-decoration: none;
      font-family: var(--font-serif); font-size: 16px; font-weight: 700;
      color: #fff; text-align: center;
    }
    .quick-tile:hover { background: #555; border-color: #555; opacity: 1; }
  </style>
</head>
<body>
  <div class="page">
    <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:16px;">
      <a href="index.html" class="back" style="margin-bottom:0;">← Back to Guide</a>
      <img src="img/starfield-logo.svg" alt="Starfield" style="height:56px; width:auto;">
    </div>
    <h1>COEX Starfield Restaurants & Cafes</h1>
    <div class="quick-tiles">
      <a href="https://m.starfield.co.kr/coexmall/tenant/floorInfo" target="_blank" rel="noopener" class="quick-tile">Floor Info</a>
      <a href="https://m.starfield.co.kr/coexmall/cafeDining/main" target="_blank" rel="noopener" class="quick-tile">F&amp;B Info</a>
    </div>

    <input class="search-box" type="text" id="search" placeholder="Search by name…" oninput="render()" />

    <div class="cats" id="cats"></div>
    <div class="cats" id="floors"></div>
    <div class="grid" id="grid"></div>
    <p class="empty" id="empty" style="display:none">No results found.</p>
  </div>

  <script>
    const CAT_LABELS = {
      '카페/디저트': 'Cafe & Dessert',
      '한식': 'Korean',
      '양식': 'Western',
      '중식': 'Chinese',
      '아시안': 'Asian',
      '일식': 'Japanese',
      '퓨전': 'Fusion',
      '분식': 'Korean Snacks',
      '패스트푸드': 'Fast Food',
      '고메스트리트': 'Gourmet Street',
    };

    let data = {};
    let activeCat = 'all';
    let activeFloor = 'all';

    fetch('coex_starfield_restaurants.json')
      .then(r => r.json())
      .then(d => { data = d; buildCats(); buildFloors(); render(); });

    function buildCats() {
      const el = document.getElementById('cats');
      const all = document.createElement('button');
      all.className = 'cat-btn active';
      all.textContent = 'All Categories';
      all.onclick = () => { activeCat = 'all'; updateActive(el, all); render(); };
      el.appendChild(all);
      Object.keys(data).forEach(k => {
        const b = document.createElement('button');
        b.className = 'cat-btn';
        b.textContent = CAT_LABELS[k] || k;
        b.onclick = () => { activeCat = k; updateActive(el, b); render(); };
        el.appendChild(b);
      });
    }

    function buildFloors() {
      const el = document.getElementById('floors');
      const FLOORS = ['all', 'B2', 'B1', '1F', '2F'];
      FLOORS.forEach(f => {
        const b = document.createElement('button');
        b.className = 'cat-btn' + (f === 'all' ? ' active' : '');
        b.textContent = f === 'all' ? 'All Floors' : f;
        b.onclick = () => { activeFloor = f; updateActive(el, b); render(); };
        el.appendChild(b);
      });
    }

    function updateActive(container, btn) {
      container.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
    }

    function render() {
      const q = document.getElementById('search').value.toLowerCase();
      const grid = document.getElementById('grid');
      const empty = document.getElementById('empty');
      grid.innerHTML = '';

      const isGourmet = activeCat === '고메스트리트';
      const cats = (activeCat === 'all' || isGourmet) ? Object.keys(data) : [activeCat];
      let count = 0;

      cats.forEach(cat => {
        (data[cat] || []).forEach(r => {
          const en = (r.name_en || '').toLowerCase();
          const ko = (r.name_ko || '').toLowerCase();
          if (q && !en.includes(q) && !ko.includes(q)) return;
          if (activeFloor !== 'all' && r.floor !== activeFloor) return;
          if (isGourmet && !r.gourmet_street) return;
          count++;
          const card = document.createElement('div');
          card.className = 'card';
          card.innerHTML = `
            <div class="card-name-en">${r.name_en || r.name_ko}</div>
            <div class="card-name-ko">${r.name_ko}</div>
            <div class="card-floor-row">
              <span class="card-floor">${r.floor}</span>
              ${r.google_maps_url ? `<a class="card-link" href="${r.google_maps_url}" target="_blank" rel="noopener">Google Maps</a>` : ''}
            </div>
          `;
          grid.appendChild(card);
        });
      });

      empty.style.display = count === 0 ? 'block' : 'none';
    }
  </script>
</body>
</html>
