<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Workshops ICML 2026</title>
  <link rel="stylesheet" href="fonts.css">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --ink: #1d1d1f; --ink-soft: #3a3a3c; --muted: #6e6e73;
      --line: #e5e5e7; --pad: clamp(20px, 5vw, 60px);
    }
    body { background: #fff; font-family: var(--font-main); color: var(--ink); font-size: 15.5px; line-height: 1.5; }
    .page { max-width: 900px; margin: 0 auto; padding: 36px var(--pad) 80px; }
    .back { display: inline-flex; align-items: center; font-size: 16px; font-weight: 400; color: #1d1d1f; text-decoration: none; margin-bottom: 32px; }
    .back:hover { color: #3273dc; }
    h2 { font-size: clamp(20px, 3vw, 26px); font-weight: 400; }
    a { color: #3273dc; text-decoration: underline; }
    a:hover { opacity: 0.7; }

    /* Header row */
    .ws-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 14px; flex-wrap: wrap; gap: 10px; }
    .ws-header-left { display: flex; align-items: center; gap: 16px; flex-wrap: wrap; }
    .ws-official { font-size: 14px; color: #3273dc; text-decoration: underline; white-space: nowrap; }
    .ws-official:hover { opacity: 0.7; }
    .date-tabs { display: flex; gap: 6px; }
    .date-tab {
      font-family: var(--font-main);
      font-size: 14px;
      padding: 4px 14px;
      border-radius: 7px;
      border: 1.5px solid var(--line);
      background: #fff;
      color: var(--muted);
      cursor: pointer;
    }
    .date-tab.active { background: #e8f0fd; border-color: #3273dc; color: #3273dc; }

    /* Workshop grid */
    .ws-list { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
    .ws-item {
      border: 1.5px solid var(--line);
      border-radius: 10px;
      padding: 14px 16px;
      cursor: pointer;
      display: flex;
      flex-direction: column;
      gap: 8px;
      transition: border-color 0.15s;
    }
    .ws-item:hover { border-color: #3273dc; }
    .ws-item:hover .ws-name { color: #3273dc; }
    .ws-name { font-size: 14px; color: var(--ink); line-height: 1.45; flex: 1; }
    .ws-location { font-size: 12px; color: #5a5a5f; background: #f0f0f2; display: inline-block; padding: 2px 8px; border-radius: 99px; align-self: flex-start; }
    @media (max-width: 600px) { .ws-list { grid-template-columns: 1fr; } body { font-size: 14.5px; } }

    /* Modal */
    .modal-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.3);
      z-index: 100;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    .modal-overlay.open { display: flex; }
    .modal {
      background: #fff;
      border-radius: 16px;
      padding: 32px 40px 28px;
      max-width: 620px;
      width: 100%;
      max-height: 85vh;
      overflow-y: auto;
      position: relative;
      box-shadow: 0 8px 40px rgba(0,0,0,0.13);
    }
    .modal-close {
      position: absolute;
      top: 16px; right: 18px;
      background: none; border: none;
      font-size: 20px; color: var(--muted);
      cursor: pointer; line-height: 1;
      font-family: var(--font-main);
    }
    .modal-close:hover { color: var(--ink); }
    .modal-title { font-size: 17px; font-weight: 400; color: var(--ink); line-height: 1.4; margin-bottom: 8px; padding-right: 28px; }
    .modal-meta { font-size: 13px; color: #3273dc; margin-bottom: 4px; }
    .modal-label { font-size: 12px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 5px; margin-top: 16px; }
    .modal-abstract { font-size: 14px; color: var(--ink-soft); line-height: 1.65; }
    .modal-organizers { font-size: 13px; color: var(--muted); margin-bottom: 2px; }
    .modal-footer { margin-top: 16px; margin-bottom: 16px; }
    .modal-btn {
      display: inline-block;
      font-family: var(--font-main);
      font-size: 14px;
      font-weight: 400;
      color: #fff;
      background: #3273dc;
      border: none;
      border-radius: 8px;
      padding: 7px 16px;
      text-decoration: none;
    }
    .modal-btn:hover { background: #1a5cbf; opacity: 1; }

    .modal::-webkit-scrollbar { width: 5px; }
    .modal::-webkit-scrollbar-track { background: transparent; margin: 14px 0; }
    .modal::-webkit-scrollbar-thumb { background: #d0d0d5; border-radius: 99px; }

    @media (max-width: 500px) {
      .modal { padding: 24px 24px 20px; }
    }
  </style>
</head>
<body>
  <div class="page">
    <a href="index.html" class="back">← Back to Guide</a>

    <div class="ws-header">
      <div class="ws-header-left">
        <h2>Workshops</h2>
        <div class="date-tabs" id="date-tabs"></div>
      </div>
      <a href="https://icml.cc/virtual/2026/events/workshop" target="_blank" rel="noopener" class="ws-official">Official page ↗</a>
    </div>

    <div class="ws-list" id="ws-list"></div>
  </div>

  <!-- Modal -->
  <div class="modal-overlay" id="modal-overlay">
    <div class="modal" id="modal">
      <button class="modal-close" id="modal-close">✕</button>
      <div class="modal-title" id="modal-title"></div>
      <div class="modal-meta" id="modal-meta"></div>
      <div class="modal-organizers" id="modal-organizers"></div>
      <div class="modal-footer" id="modal-footer"></div>
      <div class="modal-label" style="margin-top:14px;">Abstract</div>
      <div class="modal-abstract" id="modal-abstract"></div>
    </div>
  </div>

  <script>
    let workshops = [];
    let activeDate = '';

    fetch('source.json')
      .then(r => r.json())
      .then(data => {
        workshops = data.workshops;
        const dates = [...new Set(workshops.map(w => w.datetime.split(',')[0]))].sort();
        activeDate = dates[0];
        buildTabs(dates);
        renderList();
      });

    function buildTabs(dates) {
      const el = document.getElementById('date-tabs');
      dates.forEach(d => {
        const b = document.createElement('button');
        b.className = 'date-tab' + (d === activeDate ? ' active' : '');
        b.textContent = d;
        b.onclick = () => {
          activeDate = d;
          el.querySelectorAll('.date-tab').forEach(x => x.classList.remove('active'));
          b.classList.add('active');
          renderList();
        };
        el.appendChild(b);
      });
    }

    function renderList() {
      const el = document.getElementById('ws-list');
      el.innerHTML = '';
      workshops.filter(w => w.datetime.startsWith(activeDate)).forEach(w => {
        const item = document.createElement('div');
        item.className = 'ws-item';
        item.innerHTML = `<span class="ws-name">${w.name}</span><span class="ws-location">${w.location || ''}</span>`;
        item.onclick = () => openModal(w);
        el.appendChild(item);
      });
    }

    function openModal(w) {
      document.getElementById('modal-title').textContent = w.name;
      document.getElementById('modal-meta').textContent = (w.location || '') + (w.datetime ? '  ·  ' + w.datetime : '');
      document.getElementById('modal-abstract').textContent = w.description || 'No abstract available.';
      document.getElementById('modal-organizers').textContent = (w.organizers || []).join(', ');
      document.getElementById('modal-footer').innerHTML = w.website
        ? `<a href="${w.website}" target="_blank" rel="noopener" class="modal-btn">Project Page ↗</a>` : '';
      document.getElementById('modal-overlay').classList.add('open');
      document.body.style.overflow = 'hidden';
    }

    function closeModal() {
      document.getElementById('modal-overlay').classList.remove('open');
      document.body.style.overflow = '';
    }

    document.getElementById('modal-close').onclick = closeModal;
    document.getElementById('modal-overlay').onclick = e => { if (e.target === e.currentTarget) closeModal(); };
  </script>
</body>
</html>
