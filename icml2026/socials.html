<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Socials — ICML 2026 Seoul</title>
  <link rel="stylesheet" href="fonts.css">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --ink: #1d1d1f; --ink-soft: #3a3a3c; --muted: #6e6e73;
      --line: #e5e5e7; --pad: clamp(20px, 5vw, 60px);
    }
    body { background: #fff; font-family: var(--font-main); color: var(--ink); font-size: 15.5px; line-height: 1.5; }
    .page { max-width: 920px; margin: 0 auto; padding: 36px var(--pad) 80px; }
    .back { display: inline-flex; align-items: center; font-size: 16px; font-weight: 400; color: #1d1d1f; text-decoration: none; margin-bottom: 32px; }
    .back:hover { color: #3273dc; }
    h2 { font-size: clamp(20px, 3vw, 26px); font-weight: 400; margin-bottom: 6px; }
    .subtitle { font-size: 15px; color: var(--ink); margin-bottom: 16px; }

    .slack-card { display: flex; flex-direction: row; align-items: center; gap: 12px; flex-wrap: wrap; margin-bottom: 36px; }
    .slack-logo { width: 24px; height: 24px; border-radius: 4px; object-fit: cover; flex-shrink: 0; }
    .slack-btn { display: inline-flex; align-items: center; gap: 5px; background: #3a0f3b; color: #fff; border: none; border-radius: 7px; padding: 3px 9px 3px 5px; font-size: 13.5px; font-weight: 700; text-decoration: none; }
    .slack-btn:hover { background: #3a0f3b; opacity: 1; }
    .slack-by { font-size: 15px; color: var(--ink); }
    .slack-by a { color: #3273dc; text-decoration: underline; }
    .slack-by a:hover { opacity: 0.7; }
    .slack-desc { font-size: 13px; color: var(--ink-soft); }
    .date-section { margin-bottom: 36px; }
    .date-heading {
      display: flex;
      align-items: baseline;
      gap: 10px;
      padding-bottom: 9px;
      border-bottom: 1.5px solid var(--ink);
      margin-bottom: 0;
      font-family: var(--font-main);
    }
    .dh-date { font-size: 15px; font-weight: 600; color: var(--ink); }
    .dh-day  { font-size: 15px; font-weight: 600; color: var(--ink); }

    .event-rows { display: flex; flex-direction: column; }
    .event-row {
      display: flex;
      align-items: baseline;
      gap: 0;
      padding: 10px 6px 10px 0;
      border-bottom: 1px solid var(--line);
      text-decoration: none;
      color: inherit;
      transition: background 0.1s;
    }
    .event-row:last-child { border-bottom: none; }
    .event-row.has-link:hover { background: #f5f5f7; border-radius: 6px; }
    .event-row.has-link:hover .ev-name { color: #3273dc; }

    .ev-time {
      width: 190px;
      flex-shrink: 0;
      font-size: 15px;
      color: var(--ink);
      padding-right: 20px;
      line-height: 1.55;
    }
    .ev-name {
      flex: 1;
      font-size: 15px;
      color: var(--ink);
      line-height: 1.55;
    }

    @media (max-width: 600px) {
      body { font-size: 14.5px; }
      .event-row { flex-direction: column; gap: 2px; padding: 10px 0; }
      .ev-time { width: auto; font-size: 13px; color: #3273dc; }
      .ev-name { font-size: 14.5px; }
    }
  </style>
</head>
<body>
  <div class="page">
    <a href="index.html" class="back">← Back to Guide</a>
    <h2>Socials</h2>
    <p class="subtitle">Parties, meetups, and social events around ICML 2026 in Seoul. Click any event to view details and register.</p>
    <div class="slack-card">
      <span class="slack-by">Additional resource from <a href="https://deltainstitutes.org/" target="_blank" rel="noopener">Delta Institute</a>: 3k+ member ICML Community Slack to meet other attendees, find afterparties, and more.</span>
      <a href="http://icml2026.com/" target="_blank" rel="noopener" class="slack-btn"><img src="img/slack.webp" alt="Slack" class="slack-logo">Join ICML Community</a>
    </div>
    <div id="root"></div>
  </div>

  <script>
    fetch('source.json')
      .then(r => r.json())
      .then(src => {
        const events = src.events;
        const grouped = {};
        const order = [];
        events.forEach(e => {
          const key = e.date + '|' + (e.day || '');
          if (!grouped[key]) { grouped[key] = []; order.push(key); }
          grouped[key].push(e);
        });

        const root = document.getElementById('root');
        order.forEach(key => {
          const evts = grouped[key];
          const [date, day] = key.split('|');

          const section = document.createElement('div');
          section.className = 'date-section';

          const heading = document.createElement('div');
          heading.className = 'date-heading';
          if (date === 'TBA') {
            heading.innerHTML = '<span class="dh-date">TBA</span>';
          } else {
            const d = new Date(date + 'T00:00:00');
            const datePart = d.toLocaleDateString('en-US', { month: 'long', day: 'numeric' });
            const dayStr = (day && day !== 'TBA')
              ? day
              : d.toLocaleDateString('en-US', { weekday: 'long' });
            heading.innerHTML =
              '<span class="dh-date">' + datePart + '</span>' +
              '<span class="dh-day">' + dayStr + '</span>';
          }
          section.appendChild(heading);

          const rows = document.createElement('div');
          rows.className = 'event-rows';
          evts.forEach(e => {
            const hasLink = !!(e.url);
            const row = document.createElement(hasLink ? 'a' : 'div');
            row.className = 'event-row' + (hasLink ? ' has-link' : '');
            if (hasLink) {
              row.href = e.url;
              row.target = '_blank';
              row.rel = 'noopener';
            }
            row.innerHTML =
              '<div class="ev-time">' + (e.time || '—') + '</div>' +
              '<div class="ev-name">' + e.name + '</div>';
            rows.appendChild(row);
          });
          section.appendChild(rows);
          root.appendChild(section);
        });
      });
  </script>
</body>
</html>
