<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Socials ICML 2026</title>
  <link rel="stylesheet" href="fonts.css">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --ink: #1d1d1f; --ink-soft: #3a3a3c; --muted: #6e6e73;
      --line: #e5e5e7; --pad: clamp(20px, 5vw, 60px);
    }
    body { background: #fff; font-family: var(--font-main); color: var(--ink); font-size: 15.5px; line-height: 1.5; }
    .page { max-width: 1000px; margin: 0 auto; padding: 36px var(--pad) 80px; }
    .back { display: inline-flex; align-items: center; font-size: 16px; font-weight: 400; color: #1d1d1f; text-decoration: none; margin-bottom: 32px; }
    .back:hover { color: #3273dc; }
    h2 { font-size: clamp(20px, 3vw, 26px); font-weight: 400; margin-bottom: 6px; }
    .subtitle { font-size: 15px; color: var(--muted); margin-bottom: 36px; }
    .date-group { margin-bottom: 32px; }
    .date-label { font-size: 13px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 10px; }
    .event-list { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
    .event-card {
      border: 1.5px solid var(--line);
      border-radius: 10px;
      padding: 14px 18px;
      display: block;
      text-decoration: none;
      color: inherit;
      transition: border-color 0.15s;
    }
    .event-card:hover { border-color: #3273dc; opacity: 1; }
    .event-title { font-size: 15.5px; font-weight: 400; color: var(--ink); margin-bottom: 3px; }
    .event-meta { font-size: 13px; color: #3273dc; }
    @media (max-width: 600px) {
      .event-list { grid-template-columns: 1fr; }
      body { font-size: 14.5px; }
    }
  </style>
</head>
<body>
  <div class="page">
    <a href="index.html" class="back">← Back to Guide</a>
    <h2>Socials</h2>
    <p class="subtitle">Events, parties, and meetups around ICML 2026.</p>
    <div id="root"></div>
  </div>

  <script>
    fetch('source.json')
      .then(r => r.json())
      .then(src => {
        const events = src.events;
        const grouped = {};
        events.forEach(e => {
          const key = e.date + '|' + e.day;
          if (!grouped[key]) grouped[key] = [];
          grouped[key].push(e);
        });

        const root = document.getElementById('root');
        Object.entries(grouped).forEach(([key, evts]) => {
          const [date, day] = key.split('|');
          const d = new Date(date + 'T00:00:00');
          const label = d.toLocaleDateString('en-US', { month: 'long', day: 'numeric' }) + ', ' + day;

          const group = document.createElement('div');
          group.className = 'date-group';
          group.innerHTML = `<div class="date-label">${label}</div>`;

          const list = document.createElement('div');
          list.className = 'event-list';
          evts.forEach(e => {
            const meta = e.time || '';
            const card = document.createElement('a');
            card.className = 'event-card';
            card.href = e.url || e.homepage || '#';
            card.target = '_blank';
            card.rel = 'noopener';
            card.innerHTML = `
              <div class="event-title">${e.name}</div>
              ${meta ? `<div class="event-meta">${meta}</div>` : ''}`;
            list.appendChild(card);
          });
          group.appendChild(list);
          root.appendChild(group);
        });
      });
  </script>
</body>
</html>
